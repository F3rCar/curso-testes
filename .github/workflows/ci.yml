name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: .node-version
        cache: 'npm'
    - run: npm ci
    - run: npm run lint 

  test-unit:

    runs-on: ubuntu-latest
    env:
      NODE_ENV: test

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: .node-version
        cache: 'npm'
    - run: npm ci
    - run: env > .env.test
    - run: npm run test:unit:all 